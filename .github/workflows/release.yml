name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-and-release:
    name: Build, test, and release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore SonicRelay.Windows.slnx

      - name: Build solution
        run: dotnet build SonicRelay.Windows.slnx --configuration Release --no-restore

      - name: Run repository structure tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tests/Repository.Structure.Tests.ps1

      - name: Run .NET tests
        run: >-
          dotnet test SonicRelay.Windows.slnx --configuration Release --no-build --no-restore
          --logger "trx;LogFilePrefix=sonicrelay-release"
          --results-directory TestResults

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $tag = '${{ github.ref_name }}'
            $version = $tag.TrimStart('v')
            $verifyTag = 'true'
          } else {
            $tag = 'v0.0.0-manual.${{ github.run_number }}'
            $version = '0.0.0-manual.${{ github.run_number }}'
            $verifyTag = 'false'
          }

          $msiVersionBase = ($version -split '[+-]')[0]
          $versionParts = @($msiVersionBase.Split('.') | Where-Object { $_ -match '^\d+$' })
          while ($versionParts.Count -lt 3) {
            $versionParts += '0'
          }
          $msiVersion = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2])"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "msi-version=$msiVersion" >> $env:GITHUB_OUTPUT
          "verify-tag=$verifyTag" >> $env:GITHUB_OUTPUT

      - name: Publish portable Windows x64 app
        run: >-
          dotnet publish src/SonicRelay.Windows.App/SonicRelay.Windows.App.csproj
          --configuration Release --runtime win-x64 --self-contained true --no-restore
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
          --output artifacts/publish/win-x64

      - name: Publish portable single-file EXE
        run: >-
          dotnet publish src/SonicRelay.Windows.App/SonicRelay.Windows.App.csproj
          --configuration Release --runtime win-x64 --self-contained true --no-restore
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output artifacts/publish/win-x64-single-file

      - name: Install WiX toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix --version

      - name: Create ZIP, EXE, MSI, and checksums
        id: assets
        shell: pwsh
        run: |
          $version = '${{ steps.release.outputs.version }}'
          $msiVersion = '${{ steps.release.outputs.msi-version }}'
          $publishDirectory = Join-Path $PWD 'artifacts/publish/win-x64'
          $singleFileDirectory = Join-Path $PWD 'artifacts/publish/win-x64-single-file'
          $distDirectory = Join-Path $PWD 'artifacts/release'

          New-Item -ItemType Directory -Force -Path $distDirectory | Out-Null

          $zipPath = Join-Path $distDirectory "SonicRelay.WindowsPublisher-win-x64-$version.zip"
          $exePath = Join-Path $distDirectory "SonicRelay.WindowsPublisher-win-x64-$version.exe"
          $msiPath = Join-Path $distDirectory "SonicRelay.WindowsPublisher-win-x64-$version.msi"
          $checksumsPath = Join-Path $distDirectory 'checksums-sha256.txt'

          @(
            "Version: $version"
            "Commit: ${{ github.sha }}"
            'Runtime: win-x64'
            "BuiltAtUtc: $((Get-Date).ToUniversalTime().ToString('O'))"
          ) | Set-Content -LiteralPath (Join-Path $publishDirectory 'BUILD-INFO.txt')

          Compress-Archive -Path "$publishDirectory/*" -DestinationPath $zipPath -CompressionLevel Optimal -Force

          $publishedExe = Join-Path $singleFileDirectory 'SonicRelay.Windows.App.exe'
          if (-not (Test-Path -LiteralPath $publishedExe)) {
            throw "Expected single-file executable was not found: $publishedExe"
          }
          Copy-Item -LiteralPath $publishedExe -Destination $exePath -Force

          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix build packaging/SonicRelay.WindowsPublisher.wxs `
            -arch x64 `
            -d ProductVersion=$msiVersion `
            -d PublishDir=$publishDirectory `
            -o $msiPath

          Get-ChildItem -Path $distDirectory -File |
            Where-Object { $_.Extension -in @('.zip', '.exe', '.msi') } |
            ForEach-Object {
              $hash = Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256
              "$($hash.Hash)  $($_.Name)"
            } | Set-Content -LiteralPath $checksumsPath -Encoding ASCII

          "zip=$zipPath" >> $env:GITHUB_OUTPUT
          "exe=$exePath" >> $env:GITHUB_OUTPUT
          "msi=$msiPath" >> $env:GITHUB_OUTPUT
          "checksums=$checksumsPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release for tag
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ steps.release.outputs.tag }}' `
            '${{ steps.assets.outputs.zip }}' `
            '${{ steps.assets.outputs.exe }}' `
            '${{ steps.assets.outputs.msi }}' `
            '${{ steps.assets.outputs.checksums }}' `
            --title 'SonicRelay Windows Publisher ${{ steps.release.outputs.tag }}' `
            --generate-notes `
            --verify-tag `
            --notes "Build version: ${{ steps.release.outputs.version }}`nCommit: ${{ github.sha }}`nRuntime: win-x64"

      - name: Create GitHub Release for manual run
        if: github.ref_type != 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ steps.release.outputs.tag }}' `
            '${{ steps.assets.outputs.zip }}' `
            '${{ steps.assets.outputs.exe }}' `
            '${{ steps.assets.outputs.msi }}' `
            '${{ steps.assets.outputs.checksums }}' `
            --target '${{ github.sha }}' `
            --title 'SonicRelay Windows Publisher ${{ steps.release.outputs.tag }}' `
            --generate-notes `
            --notes "Build version: ${{ steps.release.outputs.version }}`nCommit: ${{ github.sha }}`nRuntime: win-x64"
