name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number: build and publish an alpha prerelease from that PR head (leave empty to build the selected branch).'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-test-and-release:
    name: Build, test, and release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # When a PR number is supplied, build that PR's head; otherwise the selected ref.
          ref: ${{ github.event.inputs.pr_number && format('refs/pull/{0}/head', github.event.inputs.pr_number) || '' }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore SonicRelay.Windows.slnx

      - name: Build solution
        run: dotnet build SonicRelay.Windows.slnx --configuration Release --no-restore

      - name: Run repository structure tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tests/Repository.Structure.Tests.ps1

      - name: Run .NET tests
        run: >-
          dotnet test SonicRelay.Windows.slnx --configuration Release --no-build --no-restore
          --logger "trx;LogFilePrefix=sonicrelay-release"
          --results-directory TestResults

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $prNumber = '${{ github.event.inputs.pr_number }}'
          $runNumber = '${{ github.run_number }}'

          if ('${{ github.ref_type }}' -eq 'tag') {
            # Real, verified release from a v* tag.
            $tag = '${{ github.ref_name }}'
            $version = $tag.TrimStart('v')
            $prerelease = 'false'
          }
          elseif (-not [string]::IsNullOrWhiteSpace($prNumber)) {
            # Manual alpha build from a specific PR head.
            $tag = "v0.0.0-alpha.pr$prNumber.$runNumber"
            $version = "0.0.0-alpha.pr$prNumber.$runNumber"
            $prerelease = 'true'
          }
          else {
            # Manual build of the selected branch (also a prerelease).
            $tag = "v0.0.0-manual.$runNumber"
            $version = "0.0.0-manual.$runNumber"
            $prerelease = 'true'
          }

          $msiVersionBase = ($version -split '[+-]')[0]
          $versionParts = @($msiVersionBase.Split('.') | Where-Object { $_ -match '^\d+$' })
          while ($versionParts.Count -lt 3) {
            $versionParts += '0'
          }
          $msiVersion = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2])"

          # The commit actually checked out (the PR head for an alpha build), used as the
          # release target so the tag points at exactly what was built.
          $targetSha = (git rev-parse HEAD).Trim()

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "msi-version=$msiVersion" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "target-sha=$targetSha" >> $env:GITHUB_OUTPUT
          "pr-number=$prNumber" >> $env:GITHUB_OUTPUT

      - name: Publish portable Windows x64 app
        run: >-
          dotnet publish src/SonicRelay.Windows.Desktop/SonicRelay.Windows.Desktop.csproj
          --configuration Release --runtime win-x64 --self-contained true --no-restore
          --output artifacts/publish/win-x64

      - name: Install WiX toolset
        shell: pwsh
        run: |
          # Pin to WiX v5: v6+ requires accepting the Open Source Maintenance Fee EULA,
          # which fails an unattended CI install. v5 uses the same v4 authoring schema.
          dotnet tool install --global wix --version 5.0.2
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix --version
          # Standard bootstrapper (bal:) lives in this package in v5.
          wix extension add -g WixToolset.BootstrapperApplications.wixext/5.0.2

      - name: Create ZIP, EXE, MSI, and checksums
        id: assets
        shell: pwsh
        run: |
          $version = '${{ steps.release.outputs.version }}'
          $msiVersion = '${{ steps.release.outputs.msi-version }}'
          $publishDirectory = Join-Path $PWD 'artifacts/publish/win-x64'
          $distDirectory = Join-Path $PWD 'artifacts/release'

          New-Item -ItemType Directory -Force -Path $distDirectory | Out-Null

          $zipPath = Join-Path $distDirectory "SonicRelay.WindowsPublisher-win-x64-$version.zip"
          $exePath = Join-Path $distDirectory "SonicRelay.WindowsPublisher-win-x64-$version.exe"
          $msiPath = Join-Path $distDirectory "SonicRelay.WindowsPublisher-win-x64-$version.msi"
          $checksumsPath = Join-Path $distDirectory 'checksums-sha256.txt'

          @(
            "Version: $version"
            "Commit: ${{ github.sha }}"
            'Runtime: win-x64'
            "BuiltAtUtc: $((Get-Date).ToUniversalTime().ToString('O'))"
          ) | Set-Content -LiteralPath (Join-Path $publishDirectory 'BUILD-INFO.txt')

          Compress-Archive -Path "$publishDirectory/*" -DestinationPath $zipPath -CompressionLevel Optimal -Force

          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

          # 1) Per-user MSI (installs to %LOCALAPPDATA%\SonicRelay\WindowsPublisher).
          wix build packaging/SonicRelay.WindowsPublisher.wxs `
            -arch x64 `
            -d ProductVersion=$msiVersion `
            -d PublishDir=$publishDirectory `
            -o $msiPath

          # 2) Setup .exe = Burn bundle wrapping the MSI (NOT the raw app binary).
          #    Double-clicking it runs setup and installs per-user with no elevation.
          wix build packaging/SonicRelay.WindowsPublisher.Bundle.wxs `
            -arch x64 `
            -ext WixToolset.BootstrapperApplications.wixext `
            -d ProductVersion=$msiVersion `
            -d MsiPath=$msiPath `
            -o $exePath

          if (-not (Test-Path -LiteralPath $exePath)) {
            throw "Expected setup bundle was not produced: $exePath"
          }

          Get-ChildItem -Path $distDirectory -File |
            Where-Object { $_.Extension -in @('.zip', '.exe', '.msi') } |
            ForEach-Object {
              $hash = Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256
              "$($hash.Hash)  $($_.Name)"
            } | Set-Content -LiteralPath $checksumsPath -Encoding ASCII

          "zip=$zipPath" >> $env:GITHUB_OUTPUT
          "exe=$exePath" >> $env:GITHUB_OUTPUT
          "msi=$msiPath" >> $env:GITHUB_OUTPUT
          "checksums=$checksumsPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.release.outputs.tag }}'
          $version = '${{ steps.release.outputs.version }}'
          $targetSha = '${{ steps.release.outputs.target-sha }}'
          $prNumber = '${{ steps.release.outputs.pr-number }}'
          $isPrerelease = '${{ steps.release.outputs.prerelease }}' -eq 'true'

          if (-not [string]::IsNullOrWhiteSpace($prNumber)) {
            $title = "SonicRelay Windows Publisher $tag (alpha, PR #$prNumber)"
          } else {
            $title = "SonicRelay Windows Publisher $tag"
          }

          $extraArgs = @()
          if ('${{ github.ref_type }}' -eq 'tag') {
            # A pushed v* tag already exists; verify it points at this build.
            $extraArgs += '--verify-tag'
          } else {
            # Manual runs create the tag on the built commit (the PR head for an alpha build).
            $extraArgs += @('--target', $targetSha)
          }
          if ($isPrerelease) {
            $extraArgs += '--prerelease'
          }

          gh release create $tag `
            '${{ steps.assets.outputs.zip }}' `
            '${{ steps.assets.outputs.exe }}' `
            '${{ steps.assets.outputs.msi }}' `
            '${{ steps.assets.outputs.checksums }}' `
            --title $title `
            --generate-notes `
            --notes "Build version: $version`nCommit: $targetSha`nRuntime: win-x64" `
            @extraArgs
