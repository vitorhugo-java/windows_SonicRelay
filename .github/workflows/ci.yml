name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore SonicRelay.Windows.slnx

      - name: Build solution
        run: dotnet build SonicRelay.Windows.slnx --configuration Release --no-restore

      - name: Run repository structure tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tests/Repository.Structure.Tests.ps1

      - name: Run .NET tests
        run: >-
          dotnet test SonicRelay.Windows.slnx --configuration Release --no-build --no-restore
          --logger "trx;LogFilePrefix=sonicrelay"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: ignore
          retention-days: 14
